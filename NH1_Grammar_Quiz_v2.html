<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Horizon 1 文法クイズ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:linear-gradient(160deg,#e0f0ff 0%,#c7e2ff 50%,#ddf0ff 100%);min-height:100vh;color:#1a3558;}
#app{max-width:680px;margin:0 auto;padding:1rem 1rem 3rem;}

/* ── COMMON ── */
.card{background:rgba(255,255,255,0.82);border-radius:18px;padding:1.5rem;border:1px solid rgba(147,197,253,0.5);box-shadow:0 4px 20px rgba(59,130,246,0.1);}
.btn-primary{width:100%;padding:.9rem;background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(37,99,235,0.35);letter-spacing:.5px;}
.btn-primary:hover{opacity:.92;}
.btn-primary:disabled{opacity:.4;cursor:default;}
.btn-sub{width:100%;padding:.8rem;background:rgba(37,99,235,.1);border:1.5px solid #93c5fd;border-radius:12px;color:#1d4ed8;font-size:15px;font-weight:600;cursor:pointer;}
.btn-sub:hover{background:rgba(37,99,235,.18);}
.section-title{font-size:13px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:1px;margin-bottom:.75rem;}
.hidden{display:none!important;}

/* ── TOP ── */
.top-logo{text-align:center;padding:2rem 0 1.5rem;}
.top-logo h1{font-size:26px;font-weight:800;color:#1e40af;letter-spacing:.5px;}
.top-logo p{font-size:13px;color:#60a5fa;margin-top:5px;}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:1rem;}
.mode-card{background:rgba(255,255,255,.85);border-radius:16px;padding:1.25rem;border:2px solid #bfdbfe;text-align:center;cursor:pointer;transition:border-color .15s,box-shadow .15s;}
.mode-card:hover{border-color:#3b82f6;box-shadow:0 4px 16px rgba(59,130,246,.2);}
.mode-card .mc-icon{font-size:36px;margin-bottom:.5rem;}
.mode-card h2{font-size:15px;font-weight:700;color:#1e40af;margin-bottom:.25rem;}
.mode-card p{font-size:12px;color:#60a5fa;}

/* ── NAME INPUT ── */
.name-card{margin-top:1.5rem;}
.name-input{width:100%;padding:.85rem 1rem;border:2px solid #bfdbfe;border-radius:12px;font-size:16px;color:#1a3558;outline:none;background:rgba(255,255,255,.9);}
.name-input:focus{border-color:#3b82f6;}
.room-info{background:rgba(37,99,235,.07);border-radius:10px;padding:.75rem 1rem;font-size:13px;color:#1d4ed8;margin-bottom:1rem;text-align:center;}

/* ── WAITING ── */
.waiting-box{text-align:center;padding:2rem 0;}
.waiting-box .big-check{font-size:64px;margin-bottom:1rem;}
.waiting-box h2{font-size:20px;font-weight:700;color:#1e40af;margin-bottom:.5rem;}
.waiting-box p{font-size:14px;color:#60a5fa;}
.pulse{animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.player-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:1.25rem;justify-content:center;}
.chip{background:rgba(37,99,235,.12);border-radius:20px;padding:5px 14px;font-size:13px;font-weight:600;color:#1d4ed8;}
.chip.me{background:#2563eb;color:#fff;}

/* ── QUESTION ── */
.q-header{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:16px;padding:1.1rem 1.4rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 14px rgba(37,99,235,.25);}
.q-header .qh-name{font-size:16px;font-weight:700;color:#fff;}
.q-header .qh-counter{font-size:13px;color:rgba(255,255,255,.8);}
.score-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:.9rem;}
.sc{background:rgba(255,255,255,.78);border-radius:10px;padding:.55rem;text-align:center;border:1px solid #bfdbfe;}
.sc .sl{font-size:11px;color:#3b82f6;margin-bottom:2px;}
.sc .sv{font-size:17px;font-weight:700;color:#1e40af;}
.q-box{background:linear-gradient(135deg,#1e40af,#1e3a8a);border-radius:16px;padding:1.4rem;margin-bottom:.9rem;min-height:105px;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(30,64,175,.2);}
.q-tag{display:inline-block;background:rgba(255,255,255,.18);border-radius:6px;padding:2px 10px;font-size:11px;color:#bfdbfe;margin-bottom:7px;}
.q-text{font-size:15px;font-weight:600;text-align:center;line-height:1.7;color:#fff;}
.timer-bar{height:6px;background:rgba(255,255,255,.18);border-radius:3px;margin-top:.9rem;width:100%;overflow:hidden;}
.timer-fill{height:100%;background:#fff;border-radius:3px;transition:width .1s linear;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:.9rem;}
.opt{border:none;border-radius:12px;padding:.9rem .7rem;font-size:13px;font-weight:600;cursor:pointer;text-align:left;line-height:1.5;color:#fff;transition:transform .1s;}
.opt:active{transform:scale(.97);}
.opt.c0{background:#e53e3e;}
.opt.c1{background:#2563eb;}
.opt.c2{background:#d97706;}
.opt.c3{background:#16a34a;}
.opt.correct{outline:4px solid #fff;outline-offset:2px;}
.opt.wrong{opacity:.32;}
.opt:disabled{cursor:default;}
.fb{border-radius:12px;padding:.8rem 1rem;font-size:15px;font-weight:700;text-align:center;margin-bottom:.9rem;}
.fb-ok{background:#16a34a;color:#fff;}
.fb-ng{background:#e53e3e;color:#fff;}
.fb-to{background:#6b7280;color:#fff;}

/* ── TEACHER ── */
.teacher-header{background:linear-gradient(135deg,#7c3aed,#6d28d9);border-radius:16px;padding:1.1rem 1.4rem;margin-bottom:1rem;text-align:center;box-shadow:0 4px 14px rgba(124,58,237,.25);}
.teacher-header h2{color:#fff;font-size:18px;font-weight:700;}
.teacher-header p{color:rgba(255,255,255,.75);font-size:13px;margin-top:3px;}
.player-list{background:rgba(255,255,255,.78);border-radius:12px;overflow:hidden;border:1px solid #bfdbfe;margin-bottom:1rem;}
.pl-row{display:flex;align-items:center;padding:.7rem 1rem;border-bottom:1px solid #dbeafe;}
.pl-row:last-child{border-bottom:none;}
.pl-name{flex:1;font-size:14px;font-weight:600;color:#1a3558;}
.pl-status{font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;}
.pl-status.done{background:#dcfce7;color:#16a34a;}
.pl-status.playing{background:#fef9c3;color:#d97706;}
.pl-status.waiting{background:#f1f5f9;color:#94a3b8;}
.btn-reveal{width:100%;padding:1rem;background:linear-gradient(135deg,#7c3aed,#6d28d9);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(124,58,237,.35);}
.btn-reveal:hover{opacity:.92;}
.btn-reveal:disabled{opacity:.4;cursor:default;}

/* ── PODIUM ── */
.podium-title{text-align:center;font-size:26px;font-weight:800;color:#1e40af;margin-bottom:.25rem;}
.podium-sub{text-align:center;font-size:13px;color:#60a5fa;margin-bottom:1.75rem;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:1.75rem;}
.pb{text-align:center;flex:1;max-width:150px;}
.pb-name{font-size:13px;font-weight:700;margin-bottom:5px;word-break:break-all;color:#1e40af;}
.pb-score{font-size:13px;font-weight:700;margin-bottom:5px;color:#1a3558;}
.pb-pillar{border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;}
.pb.r1 .pb-pillar{background:linear-gradient(180deg,#ffd700,#b8860b);height:115px;color:#5a3e00;}
.pb.r2 .pb-pillar{background:linear-gradient(180deg,#c0c0c0,#808080);height:85px;color:#303030;}
.pb.r3 .pb-pillar{background:linear-gradient(180deg,#cd7f32,#8b4513);height:62px;color:#fff;}
.rank-list{background:rgba(255,255,255,.78);border-radius:12px;overflow:hidden;border:1px solid #bfdbfe;margin-bottom:1.25rem;}
.rr{display:flex;align-items:center;padding:.7rem 1rem;border-bottom:1px solid #dbeafe;}
.rr:last-child{border-bottom:none;}
.rr-num{width:36px;font-size:14px;font-weight:700;color:#93c5fd;}
.rr-num.top{color:#d97706;}
.rr-name{flex:1;font-size:14px;font-weight:600;color:#1a3558;}
.rr-score{font-size:14px;font-weight:700;color:#2563eb;}
.rr.highlight{background:rgba(37,99,235,.07);}
</style>
</head>
<body>
<div id="app">

  <!-- ① TOP: モード選択 -->
  <div id="screen-top">
    <div class="top-logo">
      <h1>🎮 NH1 文法クイズ</h1>
      <p>New Horizon 1 ／ Unit 1〜3</p>
    </div>
    <div class="mode-grid">
      <div class="mode-card" onclick="showStudent()">
        <div class="mc-icon">🎒</div>
        <h2>生徒モード</h2>
        <p>クイズに参加する</p>
      </div>
      <div class="mode-card" onclick="showTeacher()">
        <div class="mc-icon">👨‍🏫</div>
        <h2>先生モード</h2>
        <p>結果を管理する</p>
      </div>
    </div>
  </div>

  <!-- ② 生徒：名前入力 -->
  <div id="screen-student-name" class="hidden">
    <div class="top-logo">
      <h1>🎒 生徒モード</h1>
    </div>
    <div class="card name-card">
      <div class="section-title">あなたの名前を入力してください</div>
      <input class="name-input" type="text" id="student-name-input" placeholder="例：山田 太郎" maxlength="10">
      <br><br>
      <button class="btn-primary" id="join-btn" onclick="joinGame()" disabled>参加する</button>
      <br><br>
      <button class="btn-sub" onclick="show('screen-top')">← もどる</button>
    </div>
  </div>

  <!-- ③ 生徒：待機 -->
  <div id="screen-waiting" class="hidden">
    <div class="waiting-box">
      <div class="big-check">✅</div>
      <h2 id="waiting-name"></h2>
      <p class="pulse">先生がゲームを始めるまで待ってください…</p>
      <div class="player-chips" id="waiting-chips"></div>
    </div>
  </div>

  <!-- ④ 生徒：クイズ -->
  <div id="screen-quiz" class="hidden">
    <div class="q-header">
      <span class="qh-name" id="qh-name"></span>
      <span class="qh-counter" id="qh-counter"></span>
    </div>
    <div class="score-row">
      <div class="sc"><div class="sl">スコア</div><div class="sv" id="q-score">0</div></div>
      <div class="sc"><div class="sl">連続正解</div><div class="sv" id="q-streak">0</div></div>
      <div class="sc"><div class="sl">残り時間</div><div class="sv" id="q-timer">20</div></div>
    </div>
    <div class="q-box">
      <div class="q-tag" id="q-tag"></div>
      <div class="q-text" id="q-text"></div>
      <div class="timer-bar"><div class="timer-fill" id="timer-fill"></div></div>
    </div>
    <div class="opts" id="opts"></div>
    <div id="fb" class="fb hidden"></div>
    <button id="next-btn" class="btn-sub hidden" onclick="nextQ()">次へ →</button>
  </div>

  <!-- ⑤ 生徒：プレイ終了待機 -->
  <div id="screen-done" class="hidden">
    <div class="waiting-box">
      <div class="big-check">🏁</div>
      <h2>プレイ完了！</h2>
      <p id="done-score-text"></p>
      <br>
      <p class="pulse">先生が結果を発表するまで待ってください…</p>
    </div>
  </div>

  <!-- ⑥ 先生モード -->
  <div id="screen-teacher" class="hidden">
    <div class="teacher-header">
      <h2>👨‍🏫 先生モード</h2>
      <p>参加者の状況を確認してください</p>
    </div>
    <div class="card" style="margin-bottom:1rem;">
      <div class="section-title">参加者一覧</div>
      <div class="player-list" id="teacher-player-list">
        <div class="pl-row"><span class="pl-name" style="color:#94a3b8;">まだ誰も参加していません</span></div>
      </div>
      <div style="font-size:13px;color:#60a5fa;text-align:center;" id="teacher-count">0人参加中</div>
    </div>
    <button class="btn-reveal" id="reveal-btn" onclick="revealResults()">🏆 結果を発表する</button>
    <br><br>
    <button class="btn-sub" onclick="resetAll()">🔄 ゲームをリセット</button>
    <br><br>
    <button class="btn-sub" onclick="show('screen-top')">← もどる</button>
  </div>

  <!-- ⑦ 結果発表 -->
  <div id="screen-podium" class="hidden">
    <br>
    <div class="podium-title">🏆 最終結果</div>
    <div class="podium-sub">全員の結果発表！</div>
    <div class="podium" id="podium"></div>
    <div class="rank-list" id="rank-list"></div>
    <button class="btn-primary" onclick="resetAll()">もう一度プレイ</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  問題バンク（全30問）Unit 1〜3
// ══════════════════════════════════════════
const BANK = [
  // Unit 1 単語（7問）
  {u:'Unit 1',t:'単語',q:'"name" の意味は？',o:['名前','年齢','国','学校'],a:0},
  {u:'Unit 1',t:'単語',q:'"friend" の意味は？',o:['友達','家族','先生','兄弟'],a:0},
  {u:'Unit 1',t:'単語',q:'"favorite" の意味は？',o:['お気に入りの','有名な','新しい','大きい'],a:0},
  {u:'Unit 1',t:'単語',q:'"like" の意味は？',o:['〜が好きだ','〜を知っている','〜を持っている','〜を見る'],a:0},
  {u:'Unit 1',t:'単語',q:'"from" の意味は？',o:['〜出身の・〜から','〜のために','〜と一緒に','〜の中に'],a:0},
  // Unit 1 文法（7問）
  {u:'Unit 1',t:'文法',q:'"I ___ Ken." に入る語は？',o:['am','is','are','be'],a:0},
  {u:'Unit 1',t:'文法',q:'"This ___ my bag." に入る語は？',o:['is','am','are','be'],a:0},
  {u:'Unit 1',t:'文法',q:'"I\'m" は何の短縮形？',o:['I am','I is','I are','I be'],a:0},
  {u:'Unit 1',t:'文法',q:'"Do you like soccer?" への正しい答えは？',o:['Yes, I do.','Yes, I am.','Yes, I like.','Yes, I does.'],a:0},
  {u:'Unit 1',t:'文法',q:'"I like music." の否定文は？',o:["I don't like music.",'I not like music.','I am not like music.',"I doesn't like music."],a:0},
  // Unit 1 並び替え（3問）
  {u:'Unit 1',t:'並び替え',q:'「私はサッカーが好きです。」→ 正しい語順は？',o:['I like soccer.','Like I soccer.','I soccer like.','Soccer like I.'],a:0},
  {u:'Unit 1',t:'並び替え',q:'「あなたは野球が好きですか？」→ 正しい語順は？',o:['Do you like baseball?','You like baseball?','Are you like baseball?','Like you baseball?'],a:0},
  {u:'Unit 1',t:'並び替え',q:'「私は東京出身です。」→ 正しい語順は？',o:["I'm from Tokyo.",'I from Tokyo am.',"From Tokyo I'm."," Tokyo I'm from."],a:0},
  // Unit 2 単語（5問）
  {u:'Unit 2',t:'単語',q:'"always" の意味は？',o:['いつも','ときどき','決して〜しない','たいてい'],a:0},
  {u:'Unit 2',t:'単語',q:'"usually" の意味は？',o:['たいてい','いつも','ときどき','決して〜しない'],a:0},
  {u:'Unit 2',t:'単語',q:'"sometimes" の意味は？',o:['ときどき','いつも','たいてい','決して〜しない'],a:0},
  {u:'Unit 2',t:'単語',q:'"never" の意味は？',o:['決して〜しない','いつも','ときどき','たいてい'],a:0},
  {u:'Unit 2',t:'単語',q:'"have" の意味は？（食事の文脈で）',o:['〜を食べる・飲む','〜を持っている','〜が好きだ','〜を作る'],a:0},
  // Unit 2 文法（5問）
  {u:'Unit 2',t:'文法',q:'"He ___ soccer." に入る語は？（「彼はサッカーが好きです。」）',o:['likes','like','is like','do like'],a:0},
  {u:'Unit 2',t:'文法',q:'"Does he like math?" への正しい答えは？',o:['Yes, he does.','Yes, he do.','Yes, he is.','Yes, he likes.'],a:0},
  {u:'Unit 2',t:'文法',q:'三人称単数現在形のとき、動詞に何をつける？',o:['s または es','ing','ed','nothing'],a:0},
  {u:'Unit 2',t:'文法',q:'"study" の三人称単数現在形は？',o:['studies','studys','studying','studied'],a:0},
  {u:'Unit 2',t:'文法',q:'"have" の三人称単数現在形は？',o:['has','haves','having','had'],a:0},
  // Unit 2 並び替え（2問）
  {u:'Unit 2',t:'並び替え',q:'「彼は音楽が好きです。」→ 正しい語順は？',o:['He likes music.','He like music.','He music likes.','Likes he music.'],a:0},
  {u:'Unit 2',t:'並び替え',q:'「ケンは数学が好きではありません。」→ 正しい語順は？',o:["Ken doesn't like math.","Ken don't like math.",'Ken not likes math.',"Ken isn't like math."],a:0},
  // Unit 3 単語（3問）
  {u:'Unit 3',t:'単語',q:'"can" の意味は？',o:['〜できる','〜したい','〜しなければならない','〜してもよい'],a:0},
  {u:'Unit 3',t:'単語',q:'"join" の意味は？',o:['〜に入る・参加する','〜を始める','〜をやめる','〜を楽しむ'],a:0},
  {u:'Unit 3',t:'単語',q:'"practice" の意味は？',o:['練習する','勉強する','遊ぶ','走る'],a:0},
  // Unit 3 文法（3問）
  {u:'Unit 3',t:'文法',q:'"I ___ play the piano." に入る語は？（「私はピアノが弾けます。」）',o:['can','am','do','is'],a:0},
  {u:'Unit 3',t:'文法',q:'"Can you swim?" への正しい答えは？',o:['Yes, I can.','Yes, I do.','Yes, I am.','Yes, I swim.'],a:0},
  {u:'Unit 3',t:'文法',q:'"can" のあとの動詞の形は？',o:['動詞の原形','動詞にsをつける','動詞にingをつける','動詞にedをつける'],a:0},
];

// ══════════════════════════════════════════
//  Storage helpers（Artifact persistent storage）
// ══════════════════════════════════════════
const ROOM_KEY = 'nh1_quiz_room';

async function loadRoom() {
  try {
    const r = await window.storage.get(ROOM_KEY, true);
    return r ? JSON.parse(r.value) : null;
  } catch(e) { return null; }
}

async function saveRoom(data) {
  try {
    await window.storage.set(ROOM_KEY, JSON.stringify(data), true);
  } catch(e) {}
}

// ══════════════════════════════════════════
//  State
// ══════════════════════════════════════════
const SHAPES = ['▲','◆','●','■'];
const Q_COUNT = 10;

let myName = '';
let myScore = 0;
let myStreak = 0;
let myQIdx = 0;
let myQuestions = [];
let answered = false;
let timerInterval = null;
let timeLeft = 20;
let pollInterval = null;

// ══════════════════════════════════════════
//  Utils
// ══════════════════════════════════════════
function show(id) {
  ['screen-top','screen-student-name','screen-waiting','screen-quiz',
   'screen-done','screen-teacher','screen-podium'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function pickQuestions() {
  return shuffle(BANK).slice(0, Q_COUNT).map(q => {
    const idx = shuffle([0,1,2,3]);
    return { ...q, do: idx.map(i=>q.o[i]), ca: idx.indexOf(q.a) };
  });
}

// ══════════════════════════════════════════
//  名前入力
// ══════════════════════════════════════════
function showStudent() {
  show('screen-student-name');
  const inp = document.getElementById('student-name-input');
  inp.value = '';
  inp.oninput = () => {
    document.getElementById('join-btn').disabled = inp.value.trim() === '';
  };
}

async function joinGame() {
  myName = document.getElementById('student-name-input').value.trim();
  if(!myName) return;
  myScore = 0; myStreak = 0; myQIdx = 0;
  myQuestions = pickQuestions();

  let room = await loadRoom() || { players:[], revealed:false };
  // 同名がいれば上書き
  room.players = room.players.filter(p => p.name !== myName);
  room.players.push({ name: myName, score: 0, done: false });
  await saveRoom(room);

  show('screen-waiting');
  document.getElementById('waiting-name').textContent = myName + 'さん、参加完了！';
  startWaitingPoll();
}

function startWaitingPoll() {
  clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    const room = await loadRoom();
    if(!room) return;
    // チップ更新
    const chips = document.getElementById('waiting-chips');
    chips.innerHTML = room.players.map(p =>
      `<div class="chip${p.name===myName?' me':''}">${p.name}</div>`
    ).join('');
    // 結果発表チェック
    if(room.revealed) {
      clearInterval(pollInterval);
      showPodium(room.players);
      return;
    }
  }, 3000);

  // すぐにクイズ開始
  setTimeout(() => {
    clearInterval(pollInterval);
    show('screen-quiz');
    renderQ();
  }, 1500);
}

// ══════════════════════════════════════════
//  クイズ
// ══════════════════════════════════════════
function renderQ() {
  answered = false;
  timeLeft = 20;
  const q = myQuestions[myQIdx];
  document.getElementById('qh-name').textContent = myName + 'さん';
  document.getElementById('qh-counter').textContent = 'Q' + (myQIdx+1) + ' / ' + Q_COUNT;
  document.getElementById('q-score').textContent = myScore.toLocaleString();
  document.getElementById('q-streak').textContent = myStreak;
  document.getElementById('q-timer').textContent = 20;
  document.getElementById('q-tag').textContent = q.u + ' ／ ' + q.t;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('timer-fill').style.width = '100%';
  document.getElementById('fb').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  q.do.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt c' + i;
    btn.innerHTML = `<span>${SHAPES[i]}</span> ${opt}`;
    btn.onclick = () => selectAns(i);
    opts.appendChild(btn);
  });
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  const fill = document.getElementById('timer-fill');
  const val = document.getElementById('q-timer');
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    const pct = Math.max(0, (timeLeft/20)*100);
    if(fill) fill.style.width = pct + '%';
    if(val) val.textContent = Math.ceil(Math.max(0, timeLeft));
    if(timeLeft <= 0) { clearInterval(timerInterval); if(!answered) timeUp(); }
  }, 100);
}

function timeUp() {
  answered = true;
  const q = myQuestions[myQIdx];
  document.querySelectorAll('.opt').forEach((b,i) => {
    b.disabled = true;
    if(i===q.ca) b.classList.add('correct'); else b.classList.add('wrong');
  });
  myStreak = 0;
  document.getElementById('q-streak').textContent = 0;
  showFb('時間切れ！','fb-to');
}

function selectAns(idx) {
  if(answered) return;
  answered = true;
  clearInterval(timerInterval);
  const q = myQuestions[myQIdx];
  document.querySelectorAll('.opt').forEach((b,i) => {
    b.disabled = true;
    if(i===q.ca) b.classList.add('correct'); else b.classList.add('wrong');
  });
  if(idx === q.ca) {
    const bonus = Math.round((timeLeft/20)*1000);
    myScore += bonus;
    myStreak++;
    document.getElementById('q-score').textContent = myScore.toLocaleString();
    document.getElementById('q-streak').textContent = myStreak;
    showFb(myStreak>=3 ? '正解！ '+myStreak+'連続！' : '正解！', 'fb-ok');
  } else {
    myStreak = 0;
    document.getElementById('q-streak').textContent = 0;
    showFb('不正解...','fb-ng');
  }
}

function showFb(msg, cls) {
  const fb = document.getElementById('fb');
  fb.className = 'fb ' + cls;
  fb.textContent = msg;
  fb.classList.remove('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
}

async function nextQ() {
  myQIdx++;
  if(myQIdx >= Q_COUNT) {
    // スコアを保存
    let room = await loadRoom() || { players:[], revealed:false };
    room.players = room.players.map(p =>
      p.name === myName ? { ...p, score: myScore, done: true } : p
    );
    await saveRoom(room);
    show('screen-done');
    document.getElementById('done-score-text').textContent =
      'あなたのスコア：' + myScore.toLocaleString() + ' pt';
    startDonePoll();
  } else {
    renderQ();
  }
}

function startDonePoll() {
  clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    const room = await loadRoom();
    if(room && room.revealed) {
      clearInterval(pollInterval);
      showPodium(room.players);
    }
  }, 3000);
}

// ══════════════════════════════════════════
//  先生モード
// ══════════════════════════════════════════
function showTeacher() {
  show('screen-teacher');
  refreshTeacher();
  clearInterval(pollInterval);
  pollInterval = setInterval(refreshTeacher, 3000);
}

async function refreshTeacher() {
  const room = await loadRoom();
  const players = room ? room.players : [];
  const list = document.getElementById('teacher-player-list');
  const count = document.getElementById('teacher-count');

  if(players.length === 0) {
    list.innerHTML = '<div class="pl-row"><span class="pl-name" style="color:#94a3b8;">まだ誰も参加していません</span></div>';
    count.textContent = '0人参加中';
  } else {
    list.innerHTML = players.map(p => `
      <div class="pl-row">
        <span class="pl-name">${p.name}</span>
        <span class="pl-status ${p.done?'done':'playing'}">${p.done?'✅ 完了':'⏳ プレイ中'}</span>
      </div>
    `).join('');
    const done = players.filter(p=>p.done).length;
    count.textContent = players.length + '人参加中　／　' + done + '人完了';
  }

  if(room && room.revealed) {
    clearInterval(pollInterval);
    showPodium(room.players);
  }
}

async function revealResults() {
  const room = await loadRoom();
  if(!room || room.players.length === 0) {
    alert('まだ誰も参加していません。');
    return;
  }
  room.revealed = true;
  await saveRoom(room);
  clearInterval(pollInterval);
  showPodium(room.players);
}

// ══════════════════════════════════════════
//  表彰台
// ══════════════════════════════════════════
function showPodium(players) {
  clearInterval(pollInterval);
  const sorted = [...players].sort((a,b) => b.score - a.score);
  show('screen-podium');

  // 表彰台
  const podiumEl = document.getElementById('podium');
  const order = [1,0,2]; // 2位・1位・3位の順で表示
  const classes = ['r2','r1','r3'];
  const medals = ['🥈','🥇','🥉'];
  podiumEl.innerHTML = '';
  order.forEach((rank, di) => {
    const pl = sorted[rank];
    if(!pl) { podiumEl.innerHTML += '<div style="flex:1;max-width:150px;"></div>'; return; }
    podiumEl.innerHTML += `
      <div class="pb ${classes[di]}">
        <div class="pb-name">${pl.name}</div>
        <div class="pb-score">${pl.score.toLocaleString()}pt</div>
        <div class="pb-pillar">${medals[di]}</div>
      </div>`;
  });

  // 全員ランキング
  const rankEl = document.getElementById('rank-list');
  rankEl.innerHTML = sorted.map((pl, i) => `
    <div class="rr${pl.name===myName?' highlight':''}">
      <div class="rr-num${i<3?' top':''}">${i+1}位</div>
      <div class="rr-name">${pl.name}${pl.name===myName?' 👈':''}</div>
      <div class="rr-score">${pl.score.toLocaleString()}pt</div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════
//  リセット
// ══════════════════════════════════════════
async function resetAll() {
  clearInterval(pollInterval);
  clearInterval(timerInterval);
  myName=''; myScore=0; myStreak=0; myQIdx=0;
  await saveRoom({ players:[], revealed:false });
  show('screen-top');
}
</script>
